[mypy]
python_version = 3.12
strict = False
check_untyped_defs = False
disallow_untyped_defs = False
disallow_incomplete_defs = False
ignore_missing_imports = True
show_error_codes = True

[mypy-disnake.*]
ignore_missing_imports = True
follow_imports = skip

[mypy-aioyoomoney.*]
ignore_missing_imports = True

[mypy-sqlalchemy.*]
ignore_missing_imports = True

[mypy-dateutil.*]
ignore_missing_imports = True
